<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>AI Triage | Professional Inbox</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .sidebar-item:hover { background: #f3f4f6; color: #4f46e5; }
        .email-item:hover { background: #f9fafb; transform: translateY(-1px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8F9FD] h-screen overflow-hidden flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
        <div class="p-6 flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-200">
                <i data-lucide="sparkles" class="text-white w-5 h-5"></i>
            </div>
            <span class="font-bold text-xl tracking-tight text-slate-800">Triage<span class="text-indigo-600">AI</span></span>
        </div>

        <nav class="flex-1 px-4 space-y-1">
            <button onclick="loadEmails()" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl sidebar-item font-medium transition-all group">
                <i data-lucide="inbox" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> Inbox
                <span class="ml-auto bg-indigo-50 text-indigo-600 text-xs px-2 py-1 rounded-md" id="inbox-count">3</span>
            </button>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl sidebar-item font-medium transition-all">
                <i data-lucide="send" class="w-5 h-5"></i> Sent
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl sidebar-item font-medium transition-all">
                <i data-lucide="alert-circle" class="w-5 h-5"></i> Spam
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl sidebar-item font-medium transition-all">
                <i data-lucide="trash-2" class="w-5 h-5"></i> Trash
            </a>
        </nav>

        <div class="p-6 border-t border-slate-100">
            <div class="bg-indigo-50 p-4 rounded-2xl">
                <p class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-1">Ollama Cloud</p>
                <p class="text-[10px] text-indigo-400">Connected & Optimized</p>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- TOP NAVBAR -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10">
            <div class="flex-1 max-w-xl">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" placeholder="Search emails..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="loadEmails()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl text-sm font-semibold shadow-lg shadow-indigo-100 transition-all active:scale-95">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i> Sync Inbox
                </button>
                <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300"></div>
            </div>
        </header>

        <!-- EMAIL LIST -->
        <section class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div class="max-w-5xl mx-auto">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-slate-800">Inbox</h2>
                    <div class="flex gap-2 text-slate-400">
                        <i data-lucide="more-horizontal" class="w-5 h-5 cursor-pointer hover:text-slate-600"></i>
                    </div>
                </div>

                <div id="inbox-list" class="space-y-3">
                    <!-- Emails injected here -->
                    <div class="text-center py-20 text-slate-400">
                        <i data-lucide="mail-open" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        <p>No emails loaded. Click "Sync Inbox" to refresh.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- AI SIDE PANEL (Hidden initially) -->
    <div id="side-panel" class="w-[450px] bg-white border-l border-slate-200 shadow-2xl fixed right-0 top-0 h-full transform translate-x-full transition-transform duration-300 ease-in-out z-20 flex flex-col">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <h3 class="font-bold text-lg flex items-center gap-2">
                <i data-lucide="sparkles" class="text-indigo-600 w-5 h-5"></i> AI Intelligence
            </h3>
            <button onclick="closePanel()" class="p-2 hover:bg-slate-200 rounded-full transition-colors">
                <i data-lucide="x" class="w-5 h-5 text-slate-500"></i>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar" id="ai-content">
            <!-- AI Logic injected here -->
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:5000";

        // Initialize Lucide Icons
        lucide.createIcons();

        async function loadEmails() {
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.classList.add('animate-spin');
            
            try {
                const res = await fetch(`${API}/emails`);
                const data = await res.json();
                document.getElementById('inbox-count').innerText = data.length;
                
                const container = document.getElementById('inbox-list');
                container.innerHTML = data.map(e => `
                    <div class="bg-white border border-slate-200 p-5 rounded-2xl email-item cursor-pointer transition-all flex items-center gap-4 group" onclick="analyze(${e.id})">
                        <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold text-sm group-hover:bg-indigo-600 group-hover:text-white transition-all">
                            ${e.sender.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-center mb-0.5">
                                <span class="font-bold text-slate-800 truncate">${e.sender}</span>
                                <span class="text-[10px] text-slate-400 font-medium">10:42 AM</span>
                            </div>
                            <h4 class="text-sm font-semibold text-slate-700 truncate">${e.subject}</h4>
                            <p class="text-xs text-slate-400 truncate mt-1 leading-relaxed">${e.body}</p>
                        </div>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 opacity-0 group-hover:opacity-100 transition-all -translate-x-2 group-hover:translate-x-0"></i>
                    </div>
                `).join('');
                
                lucide.createIcons();
            } catch (err) {
                console.error("Connection failed");
            } finally {
                setTimeout(() => refreshIcon.classList.remove('animate-spin'), 500);
            }
        }

        async function analyze(id) {
            const panel = document.getElementById('side-panel');
            const content = document.getElementById('ai-content');
            
            panel.classList.remove('translate-x-full');
            content.innerHTML = `
                <div class="animate-pulse space-y-4">
                    <div class="h-4 bg-slate-100 rounded w-3/4"></div>
                    <div class="h-32 bg-slate-100 rounded-2xl"></div>
                    <div class="h-4 bg-slate-100 rounded w-1/2"></div>
                    <div class="h-24 bg-slate-100 rounded-2xl"></div>
                </div>
                <p class="text-center text-indigo-500 font-bold text-xs mt-4 uppercase tracking-widest">Gemma 3 Processing...</p>
            `;

            try {
                const res = await fetch(`${API}/process/${id}`, { method: 'POST' });
                const data = await res.json();

                const categoryColors = {
                    urgent: 'bg-red-50 text-red-600 border-red-100',
                    spam: 'bg-slate-100 text-slate-500 border-slate-200',
                    normal: 'bg-emerald-50 text-emerald-600 border-emerald-100'
                };

                content.innerHTML = `
                    <div class="space-y-1">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Original Message</p>
                        <h4 class="font-bold text-slate-800">${data.subject}</h4>
                        <p class="text-sm text-slate-500 leading-relaxed">${data.body}</p>
                    </div>

                    <div class="py-4 border-y border-slate-100">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">AI Assessment</span>
                            <span class="${categoryColors[data.category]} px-3 py-1 rounded-lg text-[10px] font-black border uppercase tracking-wider">
                                ${data.category}
                            </span>
                        </div>
                        <div class="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100">
                            <p class="text-xs text-indigo-700 leading-relaxed font-medium">
                                <i data-lucide="info" class="w-3 h-3 inline mr-1 mb-0.5"></i>
                                ${data.reason}
                            </p>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="pen-tool" class="w-3 h-3 text-indigo-600"></i> AI Generated Draft
                        </label>
                        <textarea class="w-full border border-slate-200 rounded-2xl p-4 text-sm h-40 focus:ring-4 focus:ring-indigo-100 outline-none transition-all resize-none shadow-inner leading-relaxed text-slate-700 bg-slate-50/30" id="reply-text">${data.reply}</textarea>
                    </div>

                    <button onclick="sendEmail()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-100 transition-all flex items-center justify-center gap-2 group">
                        Approve & Send Draft
                        <i data-lucide="send" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                `;
                lucide.createIcons();
            } catch (err) {
                content.innerHTML = `<div class="bg-red-50 text-red-600 p-4 rounded-2xl text-xs font-bold">Failed to process email. Is the backend running?</div>`;
            }
        }

        function closePanel() {
            document.getElementById('side-panel').classList.add('translate-x-full');
        }

        function sendEmail() {
            alert('Draft approved and dispatched successfully!');
            closePanel();
        }

        // Load emails on startup
        window.onload = loadEmails;
    </script>
</body>
</html>
